name: MotionGram Monolith Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    # Шаг 1: Роботы скачивают наши файлы ядра из твоего репозитория
    - name: Checkout MotionGram Core
      uses: actions/checkout@v4

    # Шаг 2: Сервер САМ скачивает официальный исходный код Telegram со всеми зависимостями
    - name: Download Official Telegram Source Code
      run: |
        git clone --depth 1 --recursive https://github.com official_tg
        echo "[+] Официальная база Telegram успешно скачана сервером."

    # Шаг 3: Вшиваем наши идеальные модули в фундамент скачанного Telegram
    - name: Inject MotionGram Core Modules
      run: |
        mkdir -p official_tg/TMessagesProj/src/main/java/org/telegram/ui/Components/
        cp -r org/telegram/ui/Components/* official_tg/TMessagesProj/src/main/java/org/telegram/ui/Components/
        echo "[+] Ядро MotionGram успешно интегрировано в фундамент системы."

    # Шаг 4: Настраиваем Java 17 для стабильной сборки
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # Шаг 5: Принимаем все лицензии Android SDK на сервере
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    # Шаг 6: Запускаем монолитную сборку APK из официальной папки
    - name: Compile Monolith APK
      run: |
        cd official_tg
        chmod +x gradlew
        ./gradlew assembleRelease

    # Шаг 7: Выгружаем готовый чистый APK во вкладку артефактов
    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: MotionGram-Release
        path: official_tg/TMessagesProj/build/outputs/apk/release/*.apk
