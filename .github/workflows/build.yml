name: MotionGram Monolith Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code Base
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Inject MotionGram Core
      run: |
        mkdir -p TMessagesProj/src/main/java/org/telegram/ui/Components/
        cp -r org/telegram/ui/Components/* TMessagesProj/src/main/java/org/telegram/ui/Components/

    - name: Compile Monolith APK
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: MotionGram-Release
        path: TMessagesProj/build/outputs/apk/release/*.apk
