name: MotionGram Monolith Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    # 1. Скачиваем твое идеальное Java-ядро из репозитория mentalonov/MotionGram
    - name: Checkout MotionGram Core
      uses: actions/checkout@v4

    # 2. Подтягиваем стабильную, готовую к сборке официальную базу исходников
    - name: Clone Stable Telegram Base
      run: |
        git clone --depth 1 https://github.com source_tg
        echo "[+] Стабильная база Telegram успешно развернута на сервере."

    # 3. Хирургически точно заменяем их компоненты на твое личное ядро MotionGram
    - name: Inject MotionGram Monolith Core
      run: |
        # Полностью очищаем целевую папку компонентов в базе
        mkdir -p source_tg/TMessagesProj/src/main/java/org/telegram/ui/Components/
        # Копируем твои проверенные файлы (желе, прокси, терминал, анонимность) прямо в фундамент системы
        cp -f org/telegram/ui/Components/Motion*.java source_tg/TMessagesProj/src/main/java/org/telegram/ui/Components/
        echo "[+] Ядро MotionGram успешно интегрировано в основу мессенджера."

    # 4. Настраиваем окружение Java 17 для Android SDK
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    # 5. Принимаем все лицензии Android Google
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    # 6. Запускаем компиляцию монолита на мощностях сервера Intel
    - name: Compile Monolith APK
      run: |
        cd source_tg
        chmod +x gradlew
        ./gradlew assembleRelease

    # 7. Выгружаем готовый чистый APK во вкладку Артефактов для твоего Honor 90
    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: MotionGram-Release
        path: source_tg/TMessagesProj/build/outputs/apk/release/*.apk
